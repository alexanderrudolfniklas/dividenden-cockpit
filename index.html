<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dividenden Cockpit</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      padding: 18px;
    }

    h1 { margin-bottom: 5px; }
    .subtitle { color: #94a3b8; margin-bottom: 22px; }

    .grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 14px;
    }

    .card {
      background: #1e293b;
      border-radius: 18px;
      padding: 18px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.25);
    }

    .label {
      color: #94a3b8;
      font-size: 14px;
    }

    .value {
      font-size: 28px;
      font-weight: bold;
      margin-top: 6px;
      color: #34d399;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }

    th, td {
      padding: 10px 6px;
      border-bottom: 1px solid #334155;
      text-align: left;
    }

    th { color: #94a3b8; }

    input, select, button {
      width: 100%;
      padding: 12px;
      margin-top: 8px;
      border-radius: 12px;
      border: none;
      font-size: 15px;
      box-sizing: border-box;
    }

    input, select {
      background: #334155;
      color: white;
    }

    button {
      background: #34d399;
      color: #0f172a;
      font-weight: bold;
      cursor: pointer;
    }

    .delete {
      background: #ef4444;
      color: white;
      padding: 8px;
      font-size: 13px;
    }

    .month {
      display: flex;
      justify-content: space-between;
      border-bottom: 1px solid #334155;
      padding: 10px 0;
    }

    @media (min-width: 700px) {
      .grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }
  </style>
</head>
<body>

  <h1>💸 Dividenden Cockpit</h1>
  <div class="subtitle">Dein persönlicher Überblick über Dividenden, Cashflow und Ziele</div>

  <div class="grid">
    <div class="card">
      <div class="label">Jahresdividende brutto</div>
      <div class="value" id="grossYear">0 €</div>
    </div>

    <div class="card">
      <div class="label">Jahresdividende netto</div>
      <div class="value" id="netYear">0 €</div>
    </div>

    <div class="card">
      <div class="label">Monatsdurchschnitt netto</div>
      <div class="value" id="netMonth">0 €</div>
    </div>
  </div>

  <div class="card" style="margin-top:14px;">
    <h2>Neue Aktie hinzufügen</h2>

    <input id="name" placeholder="Unternehmen, z. B. Allianz" />
    <input id="shares" type="number" placeholder="Anzahl Aktien" />
    <input id="dividend" type="number" step="0.01" placeholder="Dividende pro Aktie pro Jahr" />
    <input id="tax" type="number" step="0.1" placeholder="Steuer in %, z. B. 26.38" />

    <select id="frequency">
      <option value="12">monatlich</option>
      <option value="4">quartalsweise</option>
      <option value="2">halbjährlich</option>
      <option value="1">jährlich</option>
    </select>

    <button onclick="addStock()">Aktie hinzufügen</button>
  </div>

  <div class="card" style="margin-top:14px;">
    <h2>Portfolio</h2>
    <table>
      <thead>
        <tr>
          <th>Aktie</th>
          <th>Brutto/Jahr</th>
          <th>Netto/Jahr</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="portfolio"></tbody>
    </table>
  </div>

  <div class="card" style="margin-top:14px;">
    <h2>Monatsübersicht</h2>
    <div id="months"></div>
  </div>

<script>
  let stocks = JSON.parse(localStorage.getItem("stocks")) || [
    { name: "Allianz", shares: 18, dividend: 13.8, tax: 26.38, frequency: 1 },
    { name: "Realty Income", shares: 75, dividend: 3.08, tax: 26.38, frequency: 12 },
    { name: "Enbridge", shares: 90, dividend: 2.55, tax: 25, frequency: 4 }
  ];

  const monthNames = [
    "Januar", "Februar", "März", "April", "Mai", "Juni",
    "Juli", "August", "September", "Oktober", "November", "Dezember"
  ];

  function euro(value) {
    return value.toLocaleString("de-DE", {
      style: "currency",
      currency: "EUR"
    });
  }

  function save() {
    localStorage.setItem("stocks", JSON.stringify(stocks));
  }

  function addStock() {
    const stock = {
      name: document.getElementById("name").value,
      shares: Number(document.getElementById("shares").value),
      dividend: Number(document.getElementById("dividend").value),
      tax: Number(document.getElementById("tax").value),
      frequency: Number(document.getElementById("frequency").value)
    };

    if (!stock.name || !stock.shares || !stock.dividend) {
      alert("Bitte mindestens Name, Stückzahl und Dividende eintragen.");
      return;
    }

    stocks.push(stock);
    save();
    render();

    document.getElementById("name").value = "";
    document.getElementById("shares").value = "";
    document.getElementById("dividend").value = "";
    document.getElementById("tax").value = "";
  }

  function deleteStock(index) {
    stocks.splice(index, 1);
    save();
    render();
  }

  function render() {
    const portfolio = document.getElementById("portfolio");
    portfolio.innerHTML = "";

    let grossYear = 0;
    let netYear = 0;

    stocks.forEach((s, index) => {
      const gross = s.shares * s.dividend;
      const net = gross * (1 - (s.tax || 0) / 100);

      grossYear += gross;
      netYear += net;

      portfolio.innerHTML += `
        <tr>
          <td>${s.name}</td>
          <td>${euro(gross)}</td>
          <td>${euro(net)}</td>
          <td><button class="delete" onclick="deleteStock(${index})">X</button></td>
        </tr>
      `;
    });

    document.getElementById("grossYear").innerText = euro(grossYear);
    document.getElementById("netYear").innerText = euro(netYear);
    document.getElementById("netMonth").innerText = euro(netYear / 12);

    renderMonths();
  }

  function renderMonths() {
    const months = document.getElementById("months");
    months.innerHTML = "";

    const monthly = Array(12).fill(0);

    stocks.forEach(s => {
      const netAnnual = s.shares * s.dividend * (1 - (s.tax || 0) / 100);
      const payment = netAnnual / s.frequency;

      if (s.frequency === 12) {
        for (let i = 0; i < 12; i++) monthly[i] += payment;
      } else if (s.frequency === 4) {
        [2, 5, 8, 11].forEach(i => monthly[i] += payment);
      } else if (s.frequency === 2) {
        [5, 11].forEach(i => monthly[i] += payment);
      } else {
        monthly[4] += payment;
      }
    });

    monthNames.forEach((m, i) => {
      months.innerHTML += `
        <div class="month">
          <span>${m}</span>
          <strong>${euro(monthly[i])}</strong>
        </div>
      `;
    });
  }

  render();
</script>

</body>
    </html>
