<!DOCTYPE html>
<html>
  <head>
    <title>Dividenden Cockpit</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <style>
      body {
        font-family: Arial;
        background: #0f172a;
        color: white;
        padding: 20px;
      }
      .card {
        background: #1e293b;
        padding: 20px;
        border-radius: 15px;
        margin-bottom: 15px;
      }
    </style>
  </head>
  <body>
    <h1>💸 Dividenden Cockpit</h1>

    <div class="card">
      <h2>Jahresdividende (netto)</h2>
      <p>3.420 €</p>
    </div>

    <div class="card">
      <h2>Monatlicher Schnitt</h2>
      <p>285 €</p>
    </div>

    <div class="card">
      <h2>Ziel</h2>
      <p>500 € / Monat</p>
    </div>

  </body>
</html>
